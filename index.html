<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rock Paper Scissors Game</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="navbar">ROCK PAPER SCISSORS</div>
    <div class="options">
        <button class="rock" id="box1"></button>
        <button class="paper" id="box2"></button>
        <button class="scissors" id="box3"></button>
    </div>
    <div class="score">
        <div class="user">
            <div class="you num1">0</div>
            <div class="you">YOU</div>
        </div>
        <div class="comp">
            <div class="comp1 num2">0</div>
            <div class="comp1">COMP</div>
        </div>
    </div>
    <div class="abc">
        <div class="select">PICK YOUR MOVE</div>
        <div class="xyz">RESET</div>
    </div>
    <div class="cde">
        <div class="computer">hello</div>
    </div>
    <script src="rps.js"></script>
</body>
</html>
